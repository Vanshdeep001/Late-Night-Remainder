<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Late Night Reminder 🌙</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <div class="app-card">

      <h1>🌙 Late Night Reminder</h1>
      <p class="subtitle">
        Gentle nudges for your late-night self ✨
      </p>

      <div class="input-group">
        <input type="text" id="message" placeholder="What should I remind you about?">
        <input type="time" id="time">
        <button id="addBtn">Set Reminder</button>
      </div>

      <h2>Your Reminders</h2>
      <ul id="reminderList"></ul>

      <p class="footer-text">
        Keep this tab open to receive reminders 🔔
      </p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
